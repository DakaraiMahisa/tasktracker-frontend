name: Task Tracker Frontend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/tasktracker-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/tasktracker-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Success
        run: |
          echo "✅ Frontend pipeline complete!"
          echo "Frontend image: ${{ secrets.DOCKER_USERNAME }}/tasktracker-frontend:latest"
          echo "Commit: ${{ github.sha }}"
